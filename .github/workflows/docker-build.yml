name: Build and Push Docker Image

on:
  push:
    branches:
      - main  

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: worldtripregistry.azurecr.io
          username: ${{secrets.ACR_USERNAME}}
          password: ${{secrets.ACR_PASSWORD}}

      - name: Build Docker image
        run: |
          docker build -t worldtripregistry.azurecr.io/worldtripPricing:latest .
      - name: Push Docker image to Azure
        run: |
          docker push worldtripregistry.azurecr.io/worldtripPricing:latest
